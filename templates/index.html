<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IR Remote Manager</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>📡 IR Remote Manager</h1>
  <button class="btn btn-ghost btn-sm" id="import-btn" onclick="doImport()">
    Import Broadlink Codes
  </button>
  <button class="btn btn-primary" onclick="openWizard()">+ Add Device</button>
</header>

<main id="main-grid"></main>

<!-- ── Add Device Wizard ─────────────────────────────────────────────── -->
<div class="modal-backdrop" id="wizard-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Add New Device</h2>
      <button class="modal-close" onclick="closeWizard()">✕</button>
    </div>
    <div class="modal-body" id="wizard-body"></div>
    <div style="padding:.25rem 1.25rem 0">
      <div class="steps" id="wizard-dots"></div>
    </div>
    <div class="modal-footer" id="wizard-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
